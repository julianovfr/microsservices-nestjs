# Teste de login: subir com `docker compose up --build` nesta pasta (`services/`).
# Login via gateway: POST http://localhost:3000/api/user/login
# Body JSON: { "email": "support@example.com", "password": "support123" }

services:
  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB: user_db
    volumes:
      - ./docker/postgres/user:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: authpass
      POSTGRES_DB: auth_db
    volumes:
      - ./docker/postgres/auth:/docker-entrypoint-initdb.d:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  authentication:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: authentication
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://auth:authpass@postgres-auth:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      JWT_EXPIRES_IN: 7d
    depends_on:
      postgres-auth:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3001/authentication/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  user:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: user
    environment:
      PORT: "3002"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://user:userpass@postgres-user:5432/user_db
      AUTH_SERVICE_URL: http://authentication:3001
    depends_on:
      postgres-user:
        condition: service_healthy
      authentication:
        condition: service_healthy
    ports:
      - "3002:3002"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api-gateway
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      USER_SERVICE_URL: http://user:3002
      AUTH_SERVICE_URL: http://authentication:3001
    depends_on:
      user:
        condition: service_started
      authentication:
        condition: service_healthy
    ports:
      - "3000:3000"
